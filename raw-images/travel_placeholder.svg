<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141419" />
      <stop offset="100%" stop-color="#0c0c0e" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Viewfinder Frame -->
  <rect x="30" y="30" width="1540" height="840" fill="none" stroke="#2d2d3c" stroke-width="1.5" stroke-dasharray="8 8" rx="8" />

  <!-- Rule of Thirds Grid -->
  <line x1="533.3" y1="30" x2="533.3" y2="870" stroke="#1a1a24" stroke-width="1" />
  <line x1="1066.6" y1="30" x2="1066.6" y2="870" stroke="#1a1a24" stroke-width="1" />
  <line x1="30" y1="300" x2="1570" y2="300" stroke="#1a1a24" stroke-width="1" />
  <line x1="30" y1="600" x2="1570" y2="600" stroke="#1a1a24" stroke-width="1" />

  <!-- Center Crosshair & AF Brackets (Orange) -->
  <circle cx="800" cy="450" r="8" fill="none" stroke="#ff9100" stroke-width="1.5" stroke-opacity="0.8" />
  <path d="M 770 430 L 770 420 L 780 420" fill="none" stroke="#ff9100" stroke-width="2" stroke-linecap="round" />
  <path d="M 830 430 L 830 420 L 820 420" fill="none" stroke="#ff9100" stroke-width="2" stroke-linecap="round" />
  <path d="M 770 470 L 770 480 L 780 480" fill="none" stroke="#ff9100" stroke-width="2" stroke-linecap="round" />
  <path d="M 830 470 L 830 480 L 820 480" fill="none" stroke="#ff9100" stroke-width="2" stroke-linecap="round" />

  <!-- Corner Viewfinder Marks -->
  <path d="M 50 70 L 50 50 L 70 50" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 1550 70 L 1550 50 L 1530 50" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 50 830 L 50 850 L 70 850" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 1550 830 L 1550 850 L 1530 850" fill="none" stroke="#5d5d6c" stroke-width="2" />

  <!-- Text elements -->
  <text x="60" y="80" font-family="monospace, sans-serif" font-size="12" fill="#8d8d9c" letter-spacing="2">REC [STANDBY]</text>
  <circle cx="200" cy="76" r="4" fill="#ff9100" />

  <text x="1540" y="80" text-anchor="end" font-family="monospace, sans-serif" font-size="12" fill="#8d8d9c" letter-spacing="1">RAW 14bit</text>

  <!-- Central Metadata -->
  <text x="800" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="32" fill="#ffffff" letter-spacing="4">TRAVEL PHOTOGRAPHY</text>
  <text x="800" y="540" text-anchor="middle" font-family="monospace, sans-serif" font-size="14" fill="#ff9100" letter-spacing="3">SKELETON PLACEHOLDER</text>
  <text x="800" y="570" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" fill="#6d6d7c" letter-spacing="2">ASPECT RATIO 16:9 • ORANGE CHANNEL</text>

  <!-- Bottom Camera Data -->
  <rect x="550" y="825" width="500" height="30" fill="#0c0c0e" rx="4" stroke="#2d2d3c" stroke-width="1" />
  <text x="800" y="845" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" fill="#ff9100" letter-spacing="4">ISO 100 • 24mm • f/8.0 • 1/250s</text>
  
  <text x="60" y="845" font-family="monospace, sans-serif" font-size="12" fill="#5d5d6c" letter-spacing="1">BATTERY 88%</text>
  <text x="1540" y="845" text-anchor="end" font-family="monospace, sans-serif" font-size="12" fill="#5d5d6c" letter-spacing="1">EXP. [+0.7]</text>
</svg>
