<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141419" />
      <stop offset="100%" stop-color="#0c0c0e" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Viewfinder Frame -->
  <rect x="30" y="30" width="1140" height="740" fill="none" stroke="#2d2d3c" stroke-width="1.5" stroke-dasharray="8 8" rx="8" />

  <!-- Rule of Thirds Grid -->
  <line x1="400" y1="30" x2="400" y2="770" stroke="#1a1a24" stroke-width="1" />
  <line x1="800" y1="30" x2="800" y2="770" stroke="#1a1a24" stroke-width="1" />
  <line x1="30" y1="266.6" x2="1170" y2="266.6" stroke="#1a1a24" stroke-width="1" />
  <line x1="30" y1="533.3" x2="1170" y2="533.3" stroke="#1a1a24" stroke-width="1" />

  <!-- Center Crosshair & AF Brackets (Cyan) -->
  <circle cx="600" cy="400" r="8" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.8" />
  <path d="M 570 380 L 570 370 L 580 370" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" />
  <path d="M 630 380 L 630 370 L 620 370" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" />
  <path d="M 570 420 L 570 430 L 580 430" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" />
  <path d="M 630 420 L 630 430 L 620 430" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" />

  <!-- Corner Viewfinder Marks -->
  <path d="M 50 70 L 50 50 L 70 50" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 1150 70 L 1150 50 L 1130 50" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 50 730 L 50 750 L 70 750" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 1150 730 L 1150 750 L 1130 750" fill="none" stroke="#5d5d6c" stroke-width="2" />

  <!-- Text elements (styled like high-end monospace overlay) -->
  <text x="60" y="80" font-family="monospace, sans-serif" font-size="12" fill="#8d8d9c" letter-spacing="2">REC [STANDBY]</text>
  <circle cx="200" cy="76" r="4" fill="#00e5ff" />

  <text x="1140" y="80" text-anchor="end" font-family="monospace, sans-serif" font-size="12" fill="#8d8d9c" letter-spacing="1">RAW 14bit</text>

  <!-- Central Metadata -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="32" fill="#ffffff" letter-spacing="4">STREET PHOTOGRAPHY</text>
  <text x="600" y="490" text-anchor="middle" font-family="monospace, sans-serif" font-size="14" fill="#00e5ff" letter-spacing="3">SKELETON PLACEHOLDER</text>
  <text x="600" y="520" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" fill="#6d6d7c" letter-spacing="2">ASPECT RATIO 3:2 • CYAN CHANNEL</text>

  <!-- Bottom Camera Data -->
  <rect x="350" y="725" width="500" height="30" fill="#0c0c0e" rx="4" stroke="#2d2d3c" stroke-width="1" />
  <text x="600" y="745" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" fill="#00e5ff" letter-spacing="4">ISO 200 • 35mm • f/4.0 • 1/500s</text>
  
  <text x="60" y="745" font-family="monospace, sans-serif" font-size="12" fill="#5d5d6c" letter-spacing="1">BATTERY 94%</text>
  <text x="1140" y="745" text-anchor="end" font-family="monospace, sans-serif" font-size="12" fill="#5d5d6c" letter-spacing="1">EXP. [0.0]</text>
</svg>
