<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141419" />
      <stop offset="100%" stop-color="#0c0c0e" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Viewfinder Frame -->
  <rect x="30" y="30" width="940" height="940" fill="none" stroke="#2d2d3c" stroke-width="1.5" stroke-dasharray="8 8" rx="8" />

  <!-- Rule of Thirds Grid -->
  <line x1="333.3" y1="30" x2="333.3" y2="970" stroke="#1a1a24" stroke-width="1" />
  <line x1="666.6" y1="30" x2="666.6" y2="970" stroke="#1a1a24" stroke-width="1" />
  <line x1="30" y1="333.3" x2="970" y2="333.3" stroke="#1a1a24" stroke-width="1" />
  <line x1="30" y1="666.6" x2="970" y2="666.6" stroke="#1a1a24" stroke-width="1" />

  <!-- Center Crosshair & AF Brackets (Neutral) -->
  <circle cx="500" cy="500" r="8" fill="none" stroke="#e0e0e0" stroke-width="1.5" stroke-opacity="0.8" />
  <path d="M 470 480 L 470 470 L 480 470" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" />
  <path d="M 530 480 L 530 470 L 520 470" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" />
  <path d="M 470 520 L 470 530 L 480 530" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" />
  <path d="M 530 520 L 530 530 L 520 530" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" />

  <!-- Corner Viewfinder Marks -->
  <path d="M 50 70 L 50 50 L 70 50" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 950 70 L 950 50 L 930 50" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 50 930 L 50 950 L 70 950" fill="none" stroke="#5d5d6c" stroke-width="2" />
  <path d="M 950 930 L 950 950 L 930 950" fill="none" stroke="#5d5d6c" stroke-width="2" />

  <!-- Text elements -->
  <text x="60" y="80" font-family="monospace, sans-serif" font-size="12" fill="#8d8d9c" letter-spacing="2">REC [STANDBY]</text>
  <circle cx="200" cy="76" r="4" fill="#e0e0e0" />

  <text x="940" y="80" text-anchor="end" font-family="monospace, sans-serif" font-size="12" fill="#8d8d9c" letter-spacing="1">RAW 14bit</text>

  <!-- Central Metadata -->
  <text x="500" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="32" fill="#ffffff" letter-spacing="4">STILL LIFE PHOTOGRAPHY</text>
  <text x="500" y="590" text-anchor="middle" font-family="monospace, sans-serif" font-size="14" fill="#e0e0e0" letter-spacing="3">SKELETON PLACEHOLDER</text>
  <text x="500" y="620" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" fill="#6d6d7c" letter-spacing="2">ASPECT RATIO 1:1 • NEUTRAL CHANNEL</text>

  <!-- Bottom Camera Data -->
  <rect x="250" y="925" width="500" height="30" fill="#0c0c0e" rx="4" stroke="#2d2d3c" stroke-width="1" />
  <text x="500" y="945" text-anchor="middle" font-family="monospace, sans-serif" font-size="12" fill="#e0e0e0" letter-spacing="4">ISO 100 • 100mm • f/2.8 • 1/125s</text>
  
  <text x="60" y="945" font-family="monospace, sans-serif" font-size="12" fill="#5d5d6c" letter-spacing="1">BATTERY 76%</text>
  <text x="940" y="945" text-anchor="end" font-family="monospace, sans-serif" font-size="12" fill="#5d5d6c" letter-spacing="1">EXP. [-0.7]</text>
</svg>
