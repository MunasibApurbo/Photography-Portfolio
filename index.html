<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- CUSTOMIZE: Change this to your canonical production URL -->
    <link rel="canonical" href="https://janedoe.com/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Note: Browser title is dynamically overridden on mount in App.tsx via config.title -->
    <title>Jane Doe | Photography</title>
    
    <!-- CUSTOMIZE: Replace with your personal/portfolio keywords and SEO descriptions -->
    <meta
      name="description"
      content="Documentary, travel, and street photography portfolio by Jane Doe."
    />
    <meta name="author" content="Jane Doe" />
    <meta name="creator" content="Jane Doe" />
    <meta name="publisher" content="Jane Doe" />
    <meta
      name="keywords"
      content="Jane Doe, street photography, travel photography, photography portfolio"
    />
    <meta name="robots" content="index,follow,noimageindex,max-snippet:-1,max-video-preview:-1" />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#080808" />
    <meta name="application-name" content="Jane Doe Photography" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- CUSTOMIZE: Open Graph (OG) tags for beautiful social media preview displays -->
    <meta property="og:title" content="Jane Doe | Photography" />
    <meta
      property="og:description"
      content="Documentary, travel, and everyday stories photographed with patience, color, and a strong sense of place."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://janedoe.com/" />
    <meta property="og:site_name" content="Jane Doe Photography" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://janedoe.com/social-preview.jpg" />
    <meta property="og:image:secure_url" content="https://janedoe.com/social-preview.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A photograph from Jane Doe's photography portfolio." />
    
    <!-- CUSTOMIZE: Twitter Meta tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jane Doe | Photography" />
    <meta
      name="twitter:description"
      content="Street, travel, and portrait photography."
    />
    <meta name="twitter:image" content="https://janedoe.com/social-preview.jpg" />
    <meta name="twitter:image:alt" content="A photograph from Jane Doe's photography portfolio." />
    
    <!-- OPTIONAL: Preload hero image to eliminate visual delay on first load. 
         Remember to update this filename/widths if you change config.hero.heroImageName! -->
    <link
      rel="preload"
      as="image"
      href="/optimized/street_placeholder-1800.webp"
      imagesrcset="/optimized/street_placeholder-900.webp 900w, /optimized/street_placeholder-1800.webp 1800w"
      imagesizes="100vw"
      type="image/webp"
    />
    
    <!-- CUSTOMIZE: Structured JSON-LD SEO schema details -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Jane Doe",
        "url": "https://janedoe.com/",
        "image": "https://janedoe.com/social-preview.jpg",
        "jobTitle": "Photographer",
        "description": "Photographer focused on street, travel, and portrait photography.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "US"
        },
        "sameAs": [
          "https://www.linkedin.com/in/janedoe/",
          "https://github.com/janedoe"
        ],
        "knowsAbout": [
          "Street photography",
          "Travel photography",
          "Portrait photography"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
